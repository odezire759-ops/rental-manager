<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.Residence — Rental Manager</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #171923;
  --bg3: #1e2535;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f2f7;
  --text2: #8892a4;
  --text3: #4a5568;
  --accent: #4f9cf9;
  --accent-dim: rgba(79,156,249,0.12);
  --success: #34d399;
  --success-dim: rgba(52,211,153,0.12);
  --warn: #fbbf24;
  --warn-dim: rgba(251,191,36,0.12);
  --danger: #f87171;
  --danger-dim: rgba(248,113,113,0.12);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --radius: 10px;
  --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'IBM Plex Sans Thai', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* Layout */
.shell { display: flex; flex-direction: column; min-height: 100vh; max-width: 520px; margin: 0 auto; }
.topbar {
  padding: 16px 20px 12px;
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--bg); z-index: 10;
}
.logo { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
.logo span { color: var(--accent); }
.date-chip { font-size: 11px; color: var(--text2); font-family: 'IBM Plex Mono', monospace; }
.main { flex: 1; padding: 16px 20px 100px; }
.bottomnav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 520px;
  background: var(--bg2); border-top: 0.5px solid var(--border);
  display: flex; padding: 8px 12px 20px; gap: 4px;
}
.bnav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 8px 4px; border-radius: var(--radius-sm); border: none;
  background: transparent; color: var(--text3); cursor: pointer; transition: all 0.15s;
  font-family: 'IBM Plex Sans Thai', sans-serif;
}
.bnav-btn.active { color: var(--accent); background: var(--accent-dim); }
.bnav-btn .icon { font-size: 18px; line-height: 1; }
.bnav-btn .label { font-size: 10px; font-weight: 500; }

/* Cards */
.card {
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
}
.card-head { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase;
  letter-spacing: 0.06em; margin-bottom: 14px; }

/* Forms */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-row { margin-bottom: 10px; }
.form-row:last-child { margin-bottom: 0; }
label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 5px; font-weight: 500; letter-spacing: 0.02em; }
input, select, textarea {
  width: 100%; background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text); padding: 9px 11px;
  font-size: 13px; font-family: 'IBM Plex Sans Thai', sans-serif;
  transition: border-color 0.15s; outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
select option { background: var(--bg3); }
textarea { resize: none; height: 56px; }
.calc-field {
  background: var(--bg3); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 9px 11px; font-size: 13px;
  color: var(--text2); font-family: 'IBM Plex Mono', monospace; text-align: right;
}

/* Source selector */
.src-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
.src-btn {
  padding: 9px 4px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2);
  background: var(--bg3); color: var(--text2); font-size: 11px; font-weight: 600;
  cursor: pointer; text-align: center; transition: all 0.12s;
  font-family: 'IBM Plex Sans Thai', sans-serif; letter-spacing: 0.02em;
}
.src-btn.sel-W { background: var(--success-dim); color: var(--success); border-color: var(--success); }
.src-btn.sel-A { background: var(--warn-dim); color: var(--warn); border-color: var(--warn); }
.src-btn.sel-B { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
.src-btn.sel-T { background: var(--danger-dim); color: var(--danger); border-color: var(--danger); }
.src-btn.sel-O { background: var(--purple-dim); color: var(--purple); border-color: var(--purple); }

/* Total bar */
.total-bar {
  background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--radius); padding: 14px 16px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.total-label { font-size: 12px; color: var(--text2); }
.total-val { font-size: 22px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; color: var(--text); }

/* Buttons */
.btn-primary {
  width: 100%; padding: 12px; border: none; border-radius: var(--radius);
  background: var(--accent); color: #fff; font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: 'IBM Plex Sans Thai', sans-serif;
  transition: opacity 0.15s; letter-spacing: 0.01em;
}
.btn-primary:hover { opacity: 0.88; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

/* Tabs */
.tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.tab {
  flex: 1; padding: 8px; border-radius: var(--radius-sm);
  border: 0.5px solid var(--border); background: var(--bg2);
  color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer;
  text-align: center; font-family: 'IBM Plex Sans Thai', sans-serif; transition: all 0.12s;
}
.tab.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

/* List items */
.list-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 0.5px solid var(--border);
}
.list-item:last-child { border: none; padding-bottom: 0; }
.item-main { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.item-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }
.item-right { text-align: right; }
.item-price { font-size: 13px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
.badge-src {
  width: 20px; height: 20px; border-radius: 4px; font-size: 10px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.badge-W { background: var(--success-dim); color: var(--success); }
.badge-A { background: var(--warn-dim); color: var(--warn); }
.badge-B { background: var(--accent-dim); color: var(--accent); }
.badge-T { background: var(--danger-dim); color: var(--danger); }
.badge-O { background: var(--purple-dim); color: var(--purple); }

/* Status pills */
.pill {
  display: inline-block; padding: 2px 8px; border-radius: 99px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
}
.pill-paid { background: var(--success-dim); color: var(--success); }
.pill-pending { background: var(--warn-dim); color: var(--warn); }

/* KPI grid */
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.kpi-card {
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 14px;
}
.kpi-label { font-size: 10px; color: var(--text2); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
.kpi-val { font-size: 24px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; line-height: 1; }
.kpi-val.accent { color: var(--accent); }
.kpi-val.success { color: var(--success); }
.kpi-val.warn { color: var(--warn); }

/* Toast */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--radius); padding: 10px 18px; font-size: 13px;
  z-index: 100; white-space: nowrap; opacity: 0; transition: opacity 0.2s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.ok { border-color: var(--success); color: var(--success); }
.toast.err { border-color: var(--danger); color: var(--danger); }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text2); font-size: 13px; }
.empty { text-align: center; padding: 32px; color: var(--text3); font-size: 13px; }

/* Section */
.section { display: none; }
.section.active { display: block; }
.subsec { display: none; }
.subsec.active { display: block; }
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="logo">J.<span>Residence</span></div>
    <div class="date-chip" id="today-chip"></div>
  </div>

  <div class="main">
    <!-- DAILY -->
    <div id="sec-daily" class="section active">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('daily','form',this)">+ เพิ่มการจอง</button>
        <button class="tab" onclick="switchTab('daily','list',this)">รายการล่าสุด</button>
      </div>
      <div id="daily-form" class="subsec active">
        <div class="card">
          <div class="card-head">ข้อมูลห้อง</div>
          <div class="form-grid">
            <div class="form-row">
              <label>อาคาร</label>
              <select id="d-building">
                <option>เจเรสซิเดนซ์</option>
                <option>เอสเฮาส์</option>
                <option>คอนโด</option>
              </select>
            </div>
            <div class="form-row">
              <label>เลขห้อง</label>
              <input type="text" id="d-room" placeholder="612">
            </div>
          </div>
          <div class="form-grid">
            <div class="form-row">
              <label>วันที่เข้าพัก</label>
              <input type="date" id="d-checkin" onchange="calcNights()">
            </div>
            <div class="form-row">
              <label>วันที่ออก</label>
              <input type="date" id="d-checkout" onchange="calcNights()">
            </div>
          </div>
          <div class="form-row">
            <label>ชื่อแขก</label>
            <input type="text" id="d-guest" placeholder="ชื่อ-นามสกุล">
          </div>
        </div>

        <div class="card">
          <div class="card-head">แหล่งที่มา</div>
          <div class="src-grid" id="src-btns">
            <button class="src-btn sel-W" onclick="pickSrc('W',this)">Walk-in</button>
            <button class="src-btn" onclick="pickSrc('A',this)">Agoda</button>
            <button class="src-btn" onclick="pickSrc('B',this)">Booking</button>
            <button class="src-btn" onclick="pickSrc('T',this)">Traveloka</button>
          </div>
          <div class="form-grid">
            <div class="form-row">
              <label>ราคา/คืน (฿)</label>
              <input type="number" id="d-price" value="750" oninput="calcTotal()">
            </div>
            <div class="form-row">
              <label>จำนวนคืน</label>
              <div class="calc-field" id="d-nights">1</div>
            </div>
          </div>
          <div class="form-row">
            <label>Ref / หมายเหตุ</label>
            <input type="text" id="d-ref" placeholder="เช่น Agoda REF456 หรือว่างได้">
          </div>
        </div>

        <div class="total-bar">
          <span class="total-label">ยอดรวม</span>
          <span class="total-val" id="d-total">฿ 750</span>
        </div>
        <button class="btn-primary" id="d-submit" onclick="submitBooking()">บันทึกการจอง → Supabase</button>
      </div>

      <div id="daily-list" class="subsec">
        <div id="bookings-list"><div class="loading">กำลังโหลด...</div></div>
      </div>
    </div>

    <!-- MONTHLY -->
    <div id="sec-monthly" class="section">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('monthly','form',this)">+ บันทึกค่าเช่า</button>
        <button class="tab" onclick="switchTab('monthly','list',this)">รายการเดือนนี้</button>
      </div>
      <div id="monthly-form" class="subsec active">
        <div class="card">
          <div class="card-head">เลือกห้อง</div>
          <div class="form-grid">
            <div class="form-row">
              <label>เดือน/ปี</label>
              <input type="month" id="m-month">
            </div>
            <div class="form-row">
              <label>ห้อง</label>
              <select id="m-room" onchange="onRoomSelect()">
                <option value="">-- เลือกห้อง --</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <label>ค่าเช่า (฿)</label>
            <input type="number" id="m-rent" value="0" oninput="calcMonthTotal()">
          </div>
        </div>

        <div class="card">
          <div class="card-head">มิเตอร์ไฟฟ้า — <span id="e-rate-label" style="font-family:'IBM Plex Mono',monospace;color:var(--warn);">4.24 ฿/หน่วย</span></div>
          <div class="form-grid" style="grid-template-columns:1fr 1fr 1fr;">
            <div class="form-row"><label>ค่าเก่า</label><input type="number" id="e-old" placeholder="0" oninput="calcMeter('e')"></div>
            <div class="form-row"><label>ค่าใหม่</label><input type="number" id="e-new" placeholder="0" oninput="calcMeter('e')"></div>
            <div class="form-row"><label>รวม (฿)</label><div class="calc-field" id="e-cost">—</div></div>
          </div>
        </div>

        <div class="card">
          <div class="card-head">มิเตอร์น้ำ — <span id="w-rate-label" style="font-family:'IBM Plex Mono',monospace;color:var(--accent);">14.42 ฿/หน่วย</span></div>
          <div class="form-grid" style="grid-template-columns:1fr 1fr 1fr;">
            <div class="form-row"><label>ค่าเก่า</label><input type="number" id="w-old" placeholder="0" oninput="calcMeter('w')"></div>
            <div class="form-row"><label>ค่าใหม่</label><input type="number" id="w-new" placeholder="0" oninput="calcMeter('w')"></div>
            <div class="form-row"><label>รวม (฿)</label><div class="calc-field" id="w-cost">—</div></div>
          </div>
        </div>

        <div class="card">
          <div class="card-head">ค่าอื่นๆ</div>
          <div class="form-grid">
            <div class="form-row"><label>จอดรถยนต์ (฿)</label><input type="number" id="m-car" value="0" oninput="calcMonthTotal()"></div>
            <div class="form-row"><label>จอดมอเตอร์ไซด์ (฿)</label><input type="number" id="m-moto" value="0" oninput="calcMonthTotal()"></div>
            <div class="form-row"><label>ทีวี (฿)</label><input type="number" id="m-tv" value="0" oninput="calcMonthTotal()"></div>
            <div class="form-row"><label>ตู้เย็น (฿)</label><input type="number" id="m-fridge" value="0" oninput="calcMonthTotal()"></div>
          </div>
          <div class="form-row"><label>อื่นๆ (฿)</label><input type="number" id="m-other" value="0" oninput="calcMonthTotal()"></div>
        </div>

        <div class="total-bar">
          <span class="total-label">ยอดรวมเดือนนี้</span>
          <span class="total-val" id="m-total">฿ 0</span>
        </div>
        <button class="btn-primary" id="m-submit" onclick="submitMonthly()">บันทึกรายเดือน → Supabase</button>
      </div>

      <div id="monthly-list" class="subsec">
        <div id="monthly-list-content"><div class="loading">กำลังโหลด...</div></div>
      </div>
    </div>

    <!-- SUMMARY -->
    <div id="sec-summary" class="section">
      <div class="kpi-grid" id="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">การจองทั้งหมด</div><div class="kpi-val accent" id="kpi-total-bookings">—</div></div>
        <div class="kpi-card"><div class="kpi-label">รายรับรวม</div><div class="kpi-val success" id="kpi-revenue">—</div></div>
        <div class="kpi-card"><div class="kpi-label">ค้างชำระ (เดือน)</div><div class="kpi-val warn" id="kpi-pending">—</div></div>
        <div class="kpi-card"><div class="kpi-label">ผู้เช่าประจำ</div><div class="kpi-val" id="kpi-tenants">—</div></div>
      </div>
      <div class="card">
        <div class="card-head">สัดส่วนแหล่งที่มา (เดือนนี้)</div>
        <div id="src-chart"></div>
      </div>
      <div class="card">
        <div class="card-head">ผู้เช่าประจำ</div>
        <div id="tenants-list"><div class="loading">กำลังโหลด...</div></div>
      </div>
    </div>
  </div><!-- end main -->

  <!-- Bottom Nav -->
  <nav class="bottomnav">
    <button class="bnav-btn active" onclick="switchSection('daily',this)">
      <span class="icon">📅</span><span class="label">รายวัน</span>
    </button>
    <button class="bnav-btn" onclick="switchSection('monthly',this)">
      <span class="icon">🗓</span><span class="label">รายเดือน</span>
    </button>
    <button class="bnav-btn" onclick="switchSection('summary',this)">
      <span class="icon">📊</span><span class="label">สรุป</span>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://xjfzaarabsxngazzthpf.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqZnphYXJhYnN4bmdhenp0aHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDE2OTYsImV4cCI6MjA4OTA3NzY5Nn0.BUeCnbwYSDYgTh1SIpzWGE5LqsCz-q84vP0MuMo718M';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let settings = { electric_rate: 4.24, water_rate: 14.42 };
let tenants = [];
let selectedSrc = 'W';
let eCost = 0, wCost = 0;

// --- Init ---
async function init() {
  const now = new Date();
  document.getElementById('today-chip').textContent =
    now.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});
  const ci = document.getElementById('d-checkin');
  const co = document.getElementById('d-checkout');
  const today = now.toISOString().split('T')[0];
  ci.value = today; co.value = today;

  const mm = now.toISOString().slice(0,7);
  document.getElementById('m-month').value = mm;

  await loadSettings();
  await loadTenants();
  loadBookingsList();
  loadMonthlyList();
  loadSummary();
}

async function loadSettings() {
  const { data } = await sb.from('settings').select('*').eq('id','default').single();
  if (data) {
    settings = data;
    document.getElementById('e-rate-label').textContent = data.electric_rate + ' ฿/หน่วย';
    document.getElementById('w-rate-label').textContent = data.water_rate + ' ฿/หน่วย';
  }
}

async function loadTenants() {
  const { data } = await sb.from('tenants').select('*').eq('status','active').order('room');
  if (data) {
    tenants = data;
    const sel = document.getElementById('m-room');
    sel.innerHTML = '<option value="">-- เลือกห้อง --</option>';
    data.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.room;
      opt.dataset.rent = t.rent;
      opt.dataset.name = t.name;
      opt.textContent = `${t.room} – ${t.name}`;
      sel.appendChild(opt);
    });
  }
}

// --- Daily ---
function pickSrc(code, btn) {
  selectedSrc = code;
  document.querySelectorAll('.src-btn').forEach(b => b.className = 'src-btn');
  btn.className = 'src-btn sel-' + code;
  calcTotal();
}
function calcNights() {
  const ci = document.getElementById('d-checkin').value;
  const co = document.getElementById('d-checkout').value;
  if (!ci || !co) return;
  const n = Math.max(1, Math.round((new Date(co) - new Date(ci)) / 86400000));
  document.getElementById('d-nights').textContent = n;
  calcTotal();
}
function calcTotal() {
  const p = parseFloat(document.getElementById('d-price').value) || 0;
  const n = parseInt(document.getElementById('d-nights').textContent) || 1;
  document.getElementById('d-total').textContent = '฿ ' + (p * n).toLocaleString('th-TH');
}
async function submitBooking() {
  const btn = document.getElementById('d-submit');
  const ci = document.getElementById('d-checkin').value;
  const co = document.getElementById('d-checkout').value;
  const room = document.getElementById('d-room').value.trim();
  if (!room || !ci || !co) { showToast('กรุณากรอกห้องและวันที่', 'err'); return; }
  btn.disabled = true;
  const price = parseFloat(document.getElementById('d-price').value) || 0;
  const nights = parseInt(document.getElementById('d-nights').textContent) || 1;
  const { error } = await sb.from('bookings').insert({
    room, building: document.getElementById('d-building').value,
    check_in: ci, check_out: co,
    guest_name: document.getElementById('d-guest').value,
    source: selectedSrc,
    price_per_night: price,
    total_price: price * nights,
    ref: document.getElementById('d-ref').value,
  });
  btn.disabled = false;
  if (error) { showToast('Error: ' + error.message, 'err'); return; }
  showToast('บันทึกสำเร็จ ✓', 'ok');
  loadBookingsList();
  loadSummary();
}
async function loadBookingsList() {
  const { data } = await sb.from('bookings').select('*').order('created_at',{ascending:false}).limit(20);
  const el = document.getElementById('bookings-list');
  if (!data || data.length === 0) { el.innerHTML = '<div class="empty">ยังไม่มีรายการ</div>'; return; }
  el.innerHTML = '<div class="card">' + data.map(b => `
    <div class="list-item">
      <div>
        <div class="item-main">
          <span class="badge-src badge-${b.source}">${b.source}</span>
          ห้อง ${b.room}
        </div>
        <div class="item-sub">${b.guest_name || 'ไม่ระบุชื่อ'} · ${fmtDate(b.check_in)}${b.check_out !== b.check_in ? ' – '+fmtDate(b.check_out) : ''}</div>
      </div>
      <div class="item-right">
        <div class="item-price">฿${(b.total_price||0).toLocaleString('th-TH')}</div>
        <span class="pill pill-${b.status === 'confirmed' ? 'paid' : 'pending'}">${b.status}</span>
      </div>
    </div>`).join('') + '</div>';
}

// --- Monthly ---
function onRoomSelect() {
  const sel = document.getElementById('m-room');
  const opt = sel.options[sel.selectedIndex];
  if (opt && opt.dataset.rent) {
    document.getElementById('m-rent').value = opt.dataset.rent;
    calcMonthTotal();
  }
}
function calcMeter(type) {
  const o = parseFloat(document.getElementById(type+'-old').value) || 0;
  const n = parseFloat(document.getElementById(type+'-new').value) || 0;
  const rate = type === 'e' ? settings.electric_rate : settings.water_rate;
  const units = Math.max(0, n - o);
  const cost = Math.round(units * rate);
  document.getElementById(type+'-cost').textContent = cost > 0 ? cost.toLocaleString('th-TH') : '—';
  if (type === 'e') eCost = cost; else wCost = cost;
  calcMonthTotal();
}
function calcMonthTotal() {
  const vals = ['m-rent','m-car','m-moto','m-tv','m-fridge','m-other'].map(id =>
    parseFloat(document.getElementById(id).value) || 0);
  const total = vals.reduce((a,b) => a+b, 0) + eCost + wCost;
  document.getElementById('m-total').textContent = '฿ ' + total.toLocaleString('th-TH');
}
async function submitMonthly() {
  const btn = document.getElementById('m-submit');
  const month = document.getElementById('m-month').value;
  const room = document.getElementById('m-room').value;
  if (!month || !room) { showToast('กรุณาเลือกเดือนและห้อง', 'err'); return; }
  btn.disabled = true;
  const rent = parseFloat(document.getElementById('m-rent').value) || 0;
  const total = rent + eCost + wCost +
    (['m-car','m-moto','m-tv','m-fridge','m-other'].reduce((a,id) =>
      a + (parseFloat(document.getElementById(id).value) || 0), 0));
  const sel = document.getElementById('m-room');
  const opt = sel.options[sel.selectedIndex];
  const { error } = await sb.from('monthly_charges').upsert({
    month, room,
    building: 'เจเรสซิเดนซ์',
    tenant_name: opt ? opt.dataset.name : '',
    rent,
    water_old: parseFloat(document.getElementById('w-old').value) || null,
    water_new: parseFloat(document.getElementById('w-new').value) || null,
    water_cost: wCost,
    elec_old: parseFloat(document.getElementById('e-old').value) || null,
    elec_new: parseFloat(document.getElementById('e-new').value) || null,
    elec_cost: eCost,
    parking_car: parseFloat(document.getElementById('m-car').value) || 0,
    parking_moto: parseFloat(document.getElementById('m-moto').value) || 0,
    tv_fee: parseFloat(document.getElementById('m-tv').value) || 0,
    fridge_fee: parseFloat(document.getElementById('m-fridge').value) || 0,
    other: parseFloat(document.getElementById('m-other').value) || 0,
    total,
  }, { onConflict: 'month,room' });
  btn.disabled = false;
  if (error) { showToast('Error: ' + error.message, 'err'); return; }
  showToast('บันทึกสำเร็จ ✓', 'ok');
  loadMonthlyList();
}
async function loadMonthlyList() {
  const month = document.getElementById('m-month').value;
  const { data } = await sb.from('monthly_charges').select('*').eq('month', month).order('room');
  const el = document.getElementById('monthly-list-content');
  if (!data || data.length === 0) { el.innerHTML = '<div class="empty">ยังไม่มีรายการเดือนนี้</div>'; return; }
  el.innerHTML = '<div class="card">' + data.map(m => `
    <div class="list-item">
      <div>
        <div class="item-main">ห้อง ${m.room}</div>
        <div class="item-sub">${m.tenant_name||''} · ค่าเช่า ${(m.rent||0).toLocaleString()}</div>
      </div>
      <div class="item-right">
        <div class="item-price">฿${(m.total||0).toLocaleString('th-TH')}</div>
        <span class="pill pill-${m.status === 'paid' ? 'paid' : 'pending'}">${m.status}</span>
      </div>
    </div>`).join('') + '</div>';
}

// --- Summary ---
async function loadSummary() {
  const [{ data: bData }, { data: mData }, { data: tData }] = await Promise.all([
    sb.from('bookings').select('source,total_price'),
    sb.from('monthly_charges').select('status,total').eq('month', new Date().toISOString().slice(0,7)),
    sb.from('tenants').select('*').eq('status','active'),
  ]);
  const totalBookings = bData?.length || 0;
  const revenue = bData?.reduce((a,b) => a + (b.total_price||0), 0) || 0;
  const pending = mData?.filter(m => m.status !== 'paid').length || 0;
  document.getElementById('kpi-total-bookings').textContent = totalBookings;
  document.getElementById('kpi-revenue').textContent = '฿' + Math.round(revenue/1000) + 'K';
  document.getElementById('kpi-pending').textContent = pending + ' ห้อง';
  document.getElementById('kpi-tenants').textContent = (tData?.length || 0) + ' ห้อง';

  // Source chart
  const srcCount = {};
  bData?.forEach(b => { srcCount[b.source] = (srcCount[b.source]||0) + 1; });
  const total = Object.values(srcCount).reduce((a,b)=>a+b,0) || 1;
  const srcColors = { W:'var(--success)', A:'var(--warn)', B:'var(--accent)', T:'var(--danger)', O:'var(--purple)' };
  const srcNames = { W:'Walk-in', A:'Agoda', B:'Booking.com', T:'Traveloka', O:'อื่นๆ' };
  document.getElementById('src-chart').innerHTML = Object.entries(srcCount).map(([src,cnt]) => `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;">
      <span class="badge-src badge-${src}" style="flex-shrink:0;">${src}</span>
      <div style="flex:1;background:var(--bg3);border-radius:3px;height:6px;overflow:hidden;">
        <div style="height:100%;width:${Math.round(cnt/total*100)}%;background:${srcColors[src]||'var(--accent)'};border-radius:3px;"></div>
      </div>
      <span style="font-size:11px;color:var(--text2);min-width:32px;text-align:right;font-family:'IBM Plex Mono',monospace;">${Math.round(cnt/total*100)}%</span>
    </div>`).join('') || '<div class="empty">ยังไม่มีข้อมูล</div>';

  // Tenants
  document.getElementById('tenants-list').innerHTML = tData?.length ?
    tData.map(t => `
      <div class="list-item">
        <div>
          <div class="item-main">ห้อง ${t.room}</div>
          <div class="item-sub">${t.name} · ${t.phone||'ไม่มีเบอร์'}</div>
        </div>
        <div class="item-right">
          <div class="item-price">฿${(t.rent||0).toLocaleString()}</div>
          <span class="pill pill-paid">${t.status}</span>
        </div>
      </div>`).join('') : '<div class="empty">ไม่มีผู้เช่า</div>';
}

// --- Helpers ---
function switchSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  btn.classList.add('active');
  if (id === 'summary') loadSummary();
  if (id === 'monthly') loadMonthlyList();
  if (id === 'daily') loadBookingsList();
}
function switchTab(section, sub, btn) {
  const prefix = section + '-';
  document.querySelectorAll('[id^="'+prefix+'"]').forEach(el => el.classList.remove('active'));
  btn.closest('.tabs').querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById(prefix+sub).classList.add('active');
  btn.classList.add('active');
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('th-TH',{day:'numeric',month:'short'});
}
let toastTimer;
function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 2800);
}

init();
</script>
</body>
</html>
